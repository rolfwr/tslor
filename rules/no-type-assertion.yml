id: no-type-assertion
language: TypeScript
severity: error
message: "Type assertions ('as') are a code smell. Every use must have '// ast-grep-ignore: no-type-assertion' on the preceding line with a rationale comment nearby. Prefer proper types, type guards, or runtime validation over casting."
rule:
  pattern: '$EXPR as $TYPE'
  any:
    - not:
        pattern: '$EXPR as unknown'
