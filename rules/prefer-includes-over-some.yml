id: prefer-includes-over-some
language: TypeScript
rule:
  any:
    - pattern: "$A.some($B => $B === $C)"
    - pattern: "$A.some($B => $B == $C)"
    - pattern: "$A.some($B => $C === $B)"
    - pattern: "$A.some($B => $C == $B)"
message: "Use .includes($VAL) instead of .some($EL => $EL === $VAL) for equality checks."
severity: error
